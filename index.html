<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P WhatsApp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3670/3670051.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3670/3670051.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app" class="show-list">
        <!-- Main List Screen -->
        <div id="list-screen" class="screen">
            <header class="whatsapp-header">
                <div class="header-main">
                    <h1>WhatsApp P2P</h1>
                    <div class="header-icons">
                        <span class="material-icons">search</span>
                        <span class="material-icons" id="settings-trigger">more_vert</span>
                    </div>
                </div>
                <div class="tabs">
                    <div class="tab-icon"><span class="material-icons">groups</span></div>
                    <div class="tab active">DISC.</div>
                    <div class="tab">ACTUS</div>
                    <div class="tab">APPELS</div>
                </div>
            </header>

            <div id="settings-panel" class="hidden">
                <!-- Panneau vide ou supprimé si plus besoin de menu caché -->
            </div>

            <div class="chats-container">
                <div class="user-config-container">
                    <div class="setting-item">
                        <span class="material-icons">account_circle</span>
                        <input type="text" id="username-input" placeholder="Votre pseudo">
                        <button id="save-username-btn">OK</button>
                    </div>
                    <div class="id-info">
                        <span class="id-label">Mon ID :</span>
                        <span id="header-my-id">Chargement...</span>
                        <span class="material-icons" id="header-copy-btn">content_copy</span>
                    </div>
                </div>
                <div class="connect-bar">
                    <input type="text" id="peer-id-input" placeholder="Nouvel ID ami...">
                    <button id="connect-btn"><span class="material-icons">add</span></button>
                </div>
                <ul id="peer-list">
                    <!-- Peer items will go here -->
                </ul>
            </div>

            <div class="fab">
                <span class="material-icons">message</span>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <header class="chat-header">
                <span class="material-icons" id="back-btn">arrow_back</span>
                <div class="chat-info">
                    <div class="chat-avatar" id="chat-peer-avatar">?</div>
                    <div class="chat-meta">
                        <h2 id="chat-peer-name">Ami</h2>
                        <span id="status">En ligne</span>
                    </div>
                </div>
                <div class="header-icons">
                    <span class="material-icons">videocam</span>
                    <span class="material-icons">call</span>
                    <span class="material-icons">more_vert</span>
                </div>
            </header>

            <div id="chat-messages">
                <!-- Messages will go here -->
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <span class="material-icons">insert_emoticon</span>
                    <input type="text" id="message-input" placeholder="Message">
                    <span class="material-icons">attach_file</span>
                    <span class="material-icons">photo_camera</span>
                </div>
                <button id="send-btn" class="mic-btn">
                    <span class="material-icons" id="send-icon">mic</span>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
