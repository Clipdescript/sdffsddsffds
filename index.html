<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat - Mobile Friendly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>P2P Chat</h1>
            <div id="status" class="status-indicator">Initialisation...</div>
            <div class="header-id">
                ID: <span id="header-my-id">...</span>
                <button id="header-copy-btn" title="Copier mon ID">📋</button>
            </div>
        </header>

        <main>
            <!-- Sidebar for connections -->
            <section id="sidebar" class="card">
                <h3>Amis connectés</h3>
                <ul id="peer-list"></ul>
                <div class="connect-form">
                    <input type="text" id="peer-id-input" placeholder="ID de l'ami">
                    <button id="connect-btn">Connecter</button>
                </div>
            </section>

            <!-- Chat screen -->
            <section id="chat-screen">
                <div id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="Écrivez un message...">
                    <button id="send-btn">Envoyer</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker enregistré !'))
                    .catch(err => console.error('Erreur SW:', err));
            });
        }
    </script>
</body>
</html>
